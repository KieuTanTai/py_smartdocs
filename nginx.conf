# ============================================================
# Nginx configuration for SmartDocs production
# ============================================================
# Place this at: /etc/nginx/sites-available/smartdocs
# Enable with: sudo ln -s /etc/nginx/sites-available/smartdocs /etc/nginx/sites-enabled/
# Test config:  sudo nginx -t
# Reload:       sudo systemctl reload nginx
# ============================================================

upstream smartdocs_backend {
    server 127.0.0.1:8000;
}

upstream smartdocs_frontend {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 500M;  # Allow large file uploads

    # ── Frontend (Shiny UI) ────────────────────────────────
    location / {
        proxy_pass         http://smartdocs_frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        # Shiny needs these headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;

        # Timeouts for long-running requests (file upload, chat)
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # ── Backend API ────────────────────────────────────────
    location /api/ {
        proxy_pass         http://smartdocs_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS is handled by Django; just pass through
        proxy_http_version 1.1;

        # Allow large uploads
        client_max_body_size 500M;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # ── Static files ────────────────────────────────────────
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Media files ─────────────────────────────────────────
    location /media/ {
        alias /app/storage/media/;
        expires 7d;
    }

    # ── Health check ─────────────────────────────────────────
    location /health {
        proxy_pass http://smartdocs_backend/api/health/;
        access_log off;
    }

    # ── Logging ─────────────────────────────────────────────
    access_log /var/log/nginx/smartdocs_access.log;
    error_log  /var/log/nginx/smartdocs_error.log;
}

